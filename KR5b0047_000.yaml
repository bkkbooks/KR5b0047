body:
  text: 太上召諸神龍安鎮墳墓經太上道君於開光太初之先與諸天神仙聖衆同詣長桑林下晹谷之墟同心作禮上白元始天尊臣切見凡人父母眷屬亡殁之後葬在山岡建墳立冢以安萬年冀保宜孫利子待其富貴光門今乃居家輱軻竟歲凶衰錢穀耗散非橫連綿畜養不孳田蠶不旺臣等仰賴宿因今身獲慶伏遇無上至尊釋我愚懷乞垂哀憫儻䝉宣示斯乃朽骨重肥仰受玄恩難酬生育元始天尊乃告太上道君曰卿今所說凶殃之理深可哀惘欲蘇沉迷咸居福岸卿當復坐諦聽訣言天尊曰世人今身貧困之者是先世不信道法不種善因今世葬埋不得亡人利益年月營葬之所亦有四時驚犯天星地宿致見如斯今得鄉之所奏吾甚欣然自今以後世人若有墳墓不安災衰競至者可尋髙上道士如靈寶典式廣建道場懴悔罪愆呼召龍王來安墳墓則災患冰消福祥雲集大上道君及諸衆聖俱起作禮各願受持於是天尊宣召諸大龍王各施救護東方青帝龍王南方赤帝龍王西方白帝龍王北方黑帝龍王中央黃帝龍王修吉神龍王深林神龍王多善神龍王花流神龍王甘思神龍王善然神龍王波流神龍王思慶神龍王驪龍神龍王來龍神龍王應龍神龍王諫龍神龍王三十八山神龍王二十四向神龍王天星八卦神龍王天尊曰諸大龍王各有萬衆有災之日燒香普召其龍來降隨意所願而重宣言曰歲德除青怪熒惑化炎災太白招七寶辰門揖秀回中尊鎮五墓諸惡悉皆摧神龍奠八表萬福蓊然來迫百天尊所告真經龍王名號若有善男子善女人葬埋墳墓有犯天星地禁一切龍神皆當延至正一道士轉誦此經拜請神龍來安墳墓自然門户光輝子孫繁衍此經神驗不可稱量若生不倍毀謗真文禍延億世是時大衆聞說此經皆稱不可思議作禮而退稽首奉行太上召諸神龍安鎮墳墓經
